<script src="https://unpkg.com/htmx.org"></script>
<script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
{% load static %}
<script>window.csrfToken = "{{ csrf_token }}";</script>
<script src="{% static 'tasks/js/htmx-config.js' %}"></script>
<script src="{% static 'tasks/js/task-manager.js' %}"></script>
<script src="{% static 'tasks/js/task-item.js' %}"></script>
<link rel="stylesheet" href="{% static 'tasks/css/tasks.css' %}">

<h1>My Tasks</h1>

<div x-data="taskManager({{ total_tasks }}, {{ completed_tasks }})" 
     @task-added.window="updateStats()"
     @task-updated.window="updateStats()"
     @htmx:afterSwap.window="updateStats()">
    
    <div class="task-stats">
        <p>Total: <span x-text="totalTasks"></span> | Completed: <span x-text="completedTasks"></span></p>
    </div>

    <form x-data="{ newTask: '' }" 
          hx-post="{% url 'task_list' %}" 
          hx-target="#task-container" 
          hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
          hx-swap="beforeend" 
          hx-on::after-request="newTask = ''; window.dispatchEvent(new CustomEvent('task-added'))"
          class="task-form">
        {% csrf_token %}
        <input type="text" x-model="newTask" name="title" placeholder="New task..." required>
        <button type="submit" :disabled="!newTask.trim()">Add Task</button>
    </form>

    <hr>

    <div id="task-container" class="task-container">
        {% for task in tasks %}
            {% include 'tasks/partials/task_item.html' %}
        {% endfor %}
    </div>
</div>
